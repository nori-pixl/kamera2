<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xperia AI Pro Mobile</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .viewport { position: relative; flex: 1; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.1s; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .controls { height: 120px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; padding-bottom: 20px; }
        .shutter { width: 75px; height: 75px; background: #fff; border: 5px solid #444; border-radius: 50%; cursor: pointer; }
        .ai-btn { width: 70px; padding: 10px; border: 1px solid #555; background: #222; color: #fff; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .ai-btn.active { border-color: #00e5ff; color: #00e5ff; }
        .zoom-slider { position: absolute; bottom: 140px; width: 80%; left: 10%; z-index: 500; text-align: center; }
        input[type="range"] { width: 100%; accent-color: #00e5ff; height: 40px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="viewport">
        <video id="v" autoplay playsinline muted></video>
        <div id="overlay">
            <div style="width:40px; height:40px; border:3px solid #00e5ff; border-top:3px solid transparent; border-radius:50%; animation:spin 1s linear infinite;"></div>
            <p style="color:#00e5ff; margin-top:20px; font-size:12px;">AI ENHANCING...</p>
        </div>
        <div class="zoom-slider">
            <div style="font-weight:bold; font-size:16px; text-shadow:0 0 5px #000; color:#00e5ff;" id="zl">1.0x</div>
            <input type="range" id="zs" min="1" max="10" step="0.1" value="1">
        </div>
    </div>
    <div class="controls">
        <div style="font-size:24px; cursor:pointer;" onclick="setKey()">⚙</div>
        <button id="sh" class="shutter"></button>
        <button id="aiBtn" class="ai-btn active">AI ON</button>
    </div>
    <canvas id="c" style="display:none"></canvas>
    <script>
        const v = document.getElementById('v'), zs = document.getElementById('zs'), zl = document.getElementById('zl'),
              sh = document.getElementById('sh'), c = document.getElementById('c'), aiBtn = document.getElementById('aiBtn'),
              overlay = document.getElementById('overlay');
        let isAiOn = true, pubKey = localStorage.getItem('ilove_key') || '';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 } } }).then(s => v.srcObject = s);
        zs.oninput = () => { zl.innerText = parseFloat(zs.value).toFixed(1) + "x"; v.style.transform = `scale(${zs.value})`; };
        aiBtn.onclick = () => { isAiOn = !isAiOn; aiBtn.classList.toggle('active'); aiBtn.innerText = isAiOn ? "AI ON" : "AI OFF"; };
        function setKey() { const k = prompt("Public Key:", pubKey); if(k){ pubKey=k; localStorage.setItem('ilove_key', k); } }
        sh.onclick = async () => {
            const ctx = c.getContext('2d');
            const z = parseFloat(zs.value);
            c.width = v.videoWidth; c.height = v.videoHeight;
            ctx.drawImage(v, (c.width-c.width/z)/2, (c.height-c.height/z)/2, c.width/z, c.height/z, 0, 0, c.width, c.height);
            if(!isAiOn) { save(c.toDataURL("image/jpeg", 0.9), "photo.jpg"); return; }
            overlay.style.display = 'flex';
            const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.9));
            const formData = new FormData();
            formData.append('image', blob);
            formData.append('key', pubKey);
            try {
                const res = await fetch('/process', { method: 'POST', body: formData });
                const resBlob = await res.blob();
                save(URL.createObjectURL(resBlob), "AI_Xperia_Shot.jpg");
            } catch (e) { alert("Server error"); }
            overlay.style.display = 'none';
        };
        function save(url, name) { const a = document.createElement('a'); a.href = url; a.download = name; a.click(); }
    </script>
</body>
</html>
